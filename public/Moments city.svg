<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" fill="none">
  <!-- Film-strip left accent bar -->
  <rect x="0" y="20" width="4" height="80" fill="#6B0F1A"/>

  <!-- Main wordmark -->
  <text
    x="18"
    y="58"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="700"
    font-size="32"
    letter-spacing="-0.5"
    fill="#F5F5F5"
  >MOMENTS</text>

  <!-- Divider line between words -->
  <rect x="18" y="65" width="200" height="1.5" fill="#6B0F1A"/>

  <!-- Secondary wordmark -->
  <text
    x="18"
    y="92"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="400"
    font-size="22"
    letter-spacing="8"
    fill="#A0A0A0"
  >CITY</text>

  <!-- Small "STUDIOS" label -->
  <text
    x="80"
    y="108"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="400"
    font-size="9"
    letter-spacing="4"
    fill="#6B0F1A"
  >STUDIOS</text>

  <!-- Film-strip right accent bar -->
  <rect x="316" y="20" width="4" height="80" fill="#6B0F1A"/>
</svg>
